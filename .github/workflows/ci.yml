name: Pulse CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v
        env:
          # Tests use SQLite so no real database needed
          # These placeholders prevent any environment variable errors on startup
          DATABASE_URL: sqlite:///./test.db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          LAMBDA_FUNCTION_URL: https://placeholder
          ANTHROPIC_API_KEY: sk-placeholder
          ENVIRONMENT: development

      - name: Run pip-audit security scan
        run: |
          cd backend
          pip install pip-audit
          pip-audit --ignore-vuln CVE-2026-4539

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}